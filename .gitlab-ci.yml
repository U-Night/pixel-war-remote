###############################################################################
# GitLab CI – Godot 4.6 (.NET/C#) → Android APK → Generic Package Registry
###############################################################################

variables:
  GODOT_VERSION: "4.6"
  EXPORT_NAME: "pixel-war-remote"
  PACKAGE_NAME: "pixel-war-remote"
  PACKAGE_VERSION: "0.1.0-build.${CI_PIPELINE_IID}"

stages:
  - mirror
  - export
  - upload

# ─── Stage 0 : Mirror to GitHub ─────────────────────────────────────────────
mirror_github:
  stage: mirror
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - |
      if [ -z "$GITHUB_PAT" ]; then
        echo "⚠️  GITHUB_PAT not set, skipping mirror"
        exit 0
      fi

      echo "Mirroring to GitHub…"
      git push --mirror "https://${GITHUB_PAT}@github.com/NeyZzO/pixel-war-remote.git"
      echo "✅ Mirror push complete"

# ─── Stage 1 : Build the APK ────────────────────────────────────────────────
export_android:
  stage: export
  image: barichello/godot-ci:mono-${GODOT_VERSION}
  only:
    - main
  before_script:
    # --- Export templates (Mono) ---
    - mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
    - mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/*
        ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono/ 2>/dev/null || true

    # --- Keystore setup ---
    - mkdir -p $HOME/.android $HOME/.config/godot
    - |
      if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
        echo "Using release keystore from CI/CD variable"
        echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > $HOME/.android/release.keystore
      else
        echo "No release keystore found, generating debug keystore"
        keytool -keyalg RSA -genkeypair \
          -alias androiddebugkey \
          -keypass android \
          -keystore $HOME/.android/debug.keystore \
          -storepass android \
          -dname "CN=Android Debug,O=Android,C=US" \
          -validity 9999 -deststoretype pkcs12
      fi

    # --- Install the Android build template (needed for gradle builds) ---
    # Godot expects the template in res://android/build/ (same as editor's "Install Android Build Template")
    - apt-get update && apt-get install -y --no-install-recommends unzip || true
    - |
      TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono"
      TEMPLATE_DIR_ALT="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"

      mkdir -p android/build

      if [ -f "${TEMPLATE_DIR}/android_source.zip" ]; then
        echo "Installing Android build template (mono)…"
        unzip -o "${TEMPLATE_DIR}/android_source.zip" -d android/build/
      elif [ -f "${TEMPLATE_DIR_ALT}/android_source.zip" ]; then
        echo "Installing Android build template (non-mono)…"
        unzip -o "${TEMPLATE_DIR_ALT}/android_source.zip" -d android/build/
      else
        echo "❌ android_source.zip not found!"
        exit 1
      fi

      echo "✅ Android build template installed"

      # Create .build_version file (Godot checks this to verify template version)
      if [ -f "${TEMPLATE_DIR}/version.txt" ]; then
        cp "${TEMPLATE_DIR}/version.txt" android/.build_version
      elif [ -f "${TEMPLATE_DIR_ALT}/version.txt" ]; then
        cp "${TEMPLATE_DIR_ALT}/version.txt" android/.build_version
      else
        echo "${GODOT_VERSION}.stable.mono" > android/.build_version
      fi
      echo "Build version: $(cat android/.build_version)"
  script:
    # 1) Let Godot import all assets (first run in editor mode, then quit)
    #    This step may overwrite editor_settings, so we write ours AFTER
    - godot --headless --quit --editor 2>&1 | tail -5 || true

    # 2) Build the .NET solution
    - dotnet restore || true

    # 3) Write editor settings AFTER editor import (editor overwrites the file on quit)
    #    Then export the APK — all in one block so variables persist
    - |
      if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
        KS_PATH="$HOME/.android/release.keystore"
        KS_USER="${RELEASE_KEYSTORE_USER:-release}"
        KS_PASS="${RELEASE_KEYSTORE_PASSWORD:-}"
        EXPORT_MODE="--export-release"
      else
        KS_PATH="$HOME/.android/debug.keystore"
        KS_USER="androiddebugkey"
        KS_PASS="android"
        EXPORT_MODE="--export-debug"
      fi

      cat > $HOME/.config/godot/editor_settings-4.tres <<EOFRES
      [gd_resource type="EditorSettings" format=3]

      [resource]
      export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
      export/android/android_sdk_path = "/usr/lib/android-sdk"
      export/android/debug_keystore = "${KS_PATH}"
      export/android/debug_keystore_user = "${KS_USER}"
      export/android/debug_keystore_pass = "${KS_PASS}"
      export/android/keystore/release = "${KS_PATH}"
      export/android/keystore/release_user = "${KS_USER}"
      export/android/keystore/release_password = "${KS_PASS}"
      EOFRES

      echo "Editor settings written (keystore: ${KS_PATH}, mode: ${EXPORT_MODE})"

      mkdir -p build/android
      godot --headless ${EXPORT_MODE} "Android" build/android/${EXPORT_NAME}.apk
  artifacts:
    name: "${EXPORT_NAME}-android-${CI_COMMIT_SHORT_SHA}"
    paths:
      - build/android/${EXPORT_NAME}.apk
    expire_in: 7 days

# ─── Stage 2 : Upload to Generic Package Registry ───────────────────────────
upload_package:
  stage: upload
  image: curlimages/curl:latest
  only:
    - main
  needs:
    - export_android
  script:
    - |
      echo "Uploading ${EXPORT_NAME}.apk as ${PACKAGE_NAME} v${PACKAGE_VERSION} …"

      curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "build/android/${EXPORT_NAME}.apk" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${PACKAGE_VERSION}/${EXPORT_NAME}.apk"

      echo ""
      echo "✅ APK published to Generic Package Registry"
      echo "   → ${CI_PROJECT_URL}/-/packages"
